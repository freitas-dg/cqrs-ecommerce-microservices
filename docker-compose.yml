version: '3.8'

x-otel-env: &otel-env
  OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
  OTEL_EXPORTER_OTLP_INSECURE: "true"

services:
  postgres:
    image: postgres:15-alpine
    container_name: ecommerce_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-user_db}
      POSTGRES_USER: ${POSTGRES_USER:-pg_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-user_pass_2026}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pg_user} -d ${POSTGRES_DB:-user_db}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - ecommerce_network

  mysql:
    image: mysql:8.0
    container_name: ecommerce_mysql
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-order_db}
      MYSQL_USER: ${MYSQL_USER:-my_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-my_order_2026}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_pass_2026}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - ecommerce_network

  redis_user:
    image: redis:7-alpine
    container_name: ecommerce_redis_user
    ports:
      - "6379:6379"
    volumes:
      - redis_user_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - ecommerce_network

  redis_order:
    image: redis:7-alpine
    container_name: ecommerce_redis_order
    ports:
      - "6380:6379"
    volumes:
      - redis_order_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - ecommerce_network

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: ecommerce_elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - ecommerce_network

  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: ecommerce_rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-ecommercemq}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-ecommerce_mq_2026}
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - ecommerce_network

  user-api:
    build:
      context: ./user-api
      dockerfile: Dockerfile
    container_name: ecommerce_user_api
    ports:
      - "${USER_API_PORT:-8000}:8000"
    volumes:
      - ./user-api:/app
    env_file:
      - .env
    environment:
      <<: *otel-env
      OTEL_SERVICE_NAME: user-api
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-pg_user}:${POSTGRES_PASSWORD:-user_pass_2026}@postgres:5432/${POSTGRES_DB:-user_db}
      DATABASE_URL_SYNC: postgresql+psycopg2://${POSTGRES_USER:-pg_user}:${POSTGRES_PASSWORD:-user_pass_2026}@postgres:5432/${POSTGRES_DB:-user_db}
      REDIS_URL: redis://redis_user:6379/0
      ELASTICSEARCH_URL: http://elasticsearch:9200
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-ecommercemq}:${RABBITMQ_PASSWORD:-ecommerce_mq_2026}@rabbitmq:5672/
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-ecommerce-jwt-secret-2026}
    depends_on:
      postgres:
        condition: service_healthy
      redis_user:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - ecommerce_network
    restart: on-failure

  order-api:
    build:
      context: ./order-api
      dockerfile: Dockerfile
    container_name: ecommerce_order_api
    ports:
      - "${ORDER_API_PORT:-8001}:8001"
    volumes:
      - ./order-api:/app
    env_file:
      - .env
    environment:
      <<: *otel-env
      OTEL_SERVICE_NAME: order-api
      DATABASE_URL: mysql+pymysql://${MYSQL_USER:-my_user}:${MYSQL_PASSWORD:-my_order_2026}@mysql:3306/${MYSQL_DATABASE:-order_db}
      REDIS_URL: redis://redis_order:6379/0
      ELASTICSEARCH_URL: http://elasticsearch:9200
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-ecommercemq}:${RABBITMQ_PASSWORD:-ecommerce_mq_2026}@rabbitmq:5672/
      USER_API_URL: http://user-api:8000
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-ecommerce-jwt-secret-2026}
    depends_on:
      mysql:
        condition: service_healthy
      redis_order:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      user-api:
        condition: service_started
    networks:
      - ecommerce_network
    restart: on-failure

  loki:
    image: grafana/loki:2.9.4
    container_name: ecommerce_loki
    volumes:
      - ./observability/loki/loki-config.yaml:/etc/loki/local-config.yaml
      - loki_data:/loki
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3100/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ecommerce_network

  promtail:
    image: grafana/promtail:2.9.4
    container_name: ecommerce_promtail
    volumes:
      - ./observability/promtail/promtail-config.yaml:/etc/promtail/config.yaml
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: -config.file=/etc/promtail/config.yaml
    depends_on:
      loki:
        condition: service_healthy
    networks:
      - ecommerce_network

  tempo:
    image: grafana/tempo:2.3.1
    container_name: ecommerce_tempo
    volumes:
      - ./observability/tempo/tempo-config.yaml:/etc/tempo/config.yaml
      - tempo_data:/var/tempo
    ports:
      - "3200:3200"
    command: -config.file=/etc/tempo/config.yaml
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3200/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ecommerce_network

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.92.0
    container_name: ecommerce_otel_collector
    volumes:
      - ./observability/otel-collector/otel-collector-config.yaml:/etc/otelcol-contrib/config.yaml
    ports:
      - "4317:4317"
      - "4318:4318"
      - "8889:8889"
    command: --config /etc/otelcol-contrib/config.yaml
    depends_on:
      tempo:
        condition: service_healthy
      loki:
        condition: service_healthy
    networks:
      - ecommerce_network

  prometheus:
    image: prom/prometheus:v2.45.3
    container_name: ecommerce_prometheus
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
    networks:
      - ecommerce_network

  keycloak:
    image: quay.io/keycloak/keycloak:23.0.6
    container_name: ecommerce_keycloak
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN_USER:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
    command: start-dev --import-realm
    volumes:
      - ./keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/8080;echo -e \"GET /health/ready HTTP/1.1\r\nhost: http://localhost\r\nConnection: close\r\n\r\n\" >&3;grep \"200 OK\" <&3"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ecommerce_network

  grafana:
    image: grafana/grafana:10.3.1
    container_name: ecommerce_grafana
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards
      - grafana_data:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      loki:
        condition: service_healthy
      tempo:
        condition: service_healthy
    networks:
      - ecommerce_network

volumes:
  postgres_data:
  mysql_data:
  redis_user_data:
  redis_order_data:
  es_data:
  rabbitmq_data:
  loki_data:
  tempo_data:
  prometheus_data:
  grafana_data:

networks:
  ecommerce_network:
    driver: bridge
